<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #007bff;
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px 20px;
            color: #333333;
            line-height: 1.6;
        }
        .content p {
            margin: 0 0 16px 0;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .info-table td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-table td:first-child {
            font-weight: 600;
            width: 120px;
            color: #555555;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #6c757d;
            font-size: 12px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007bff;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${subject}">Welcome to TDID E-Cert</h1>
        </div>
        <div class="content">
            <p th:text="${greeting}">Dear User,</p>
            <p th:text="${message}">Your account has been created successfully.</p>
            
            <table class="info-table" th:if="${userInfo != null}">
                <tr>
                    <td>Username:</td>
                    <td th:text="${userInfo.username}"></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td th:text="${userInfo.email}"></td>
                </tr>
                <tr>
                    <td>Full Name:</td>
                    <td th:text="${userInfo.fullName}"></td>
                </tr>
                <tr>
                    <td>Role:</td>
                    <td th:text="${userInfo.role}"></td>
                </tr>
            </table>

            <p th:if="${additionalMessage}" th:text="${additionalMessage}"></p>
            
            <p>Best regards,<br/><strong>TDID E-Cert Team</strong></p>
        </div>
        <div class="footer">
            <p>This is an automated message. Please do not reply to this email.</p>
            <p>&copy; 2024 TDID E-Cert. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
